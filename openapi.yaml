          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PathId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    TooManyRequests:
      description: Rate limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string

    UserProfile:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
        name:
          type: string
        avatar_url:
          type: string
        custom_avatar:
          type: string
          description: Base64-encoded custom avatar
        sex:
          type: string
          enum: [M, F, other]
        birth_date:
          type: string
          format: date
        age:
          type: integer
          description: Calculated from birth_date
        weight_kg:
          type: number
          format: float
        height_cm:
          type: integer
        language:
          type: string
          enum: [es, en]
        is_coach:
          type: boolean
        is_admin:
          type: boolean
        coach_description:
          type: string
        coach_public:
          type: boolean
        onboarding_completed:
          type: boolean
        has_coach:
          type: boolean
        coach_id:
          type: integer
          format: int64
        coach_name:
          type: string
        coach_avatar:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
        sex:
          type: string
          enum: [M, F, other]
        birth_date:
          type: string
          format: date
        weight_kg:
          type: number
          format: float
        height_cm:
          type: integer
        language:
          type: string
          enum: [es, en]
        onboarding_completed:
          type: boolean

    WorkoutSegment:
      type: object
      properties:
        id:
          type: integer
          format: int64
        order_index:
          type: integer
        segment_type:
          type: string
          enum: [simple, interval]
        repetitions:
          type: integer
        value:
          type: number
          format: float
        unit:
          type: string
          example: km
        intensity:
          type: string
          example: easy
        work_value:
          type: number
          format: float
        work_unit:
          type: string
        work_intensity:
          type: string
        rest_value:
          type: number
          format: float
        rest_unit:
          type: string
        rest_intensity:
          type: string

    SegmentRequest:
      type: object
      required: [segment_type]
      properties:
        segment_type:
          type: string
          enum: [simple, interval]
        repetitions:
          type: integer
          default: 1
        value:
          type: number
          format: float
        unit:
          type: string
        intensity:
          type: string
        work_value:
          type: number
          format: float
        work_unit:
          type: string
        work_intensity:
          type: string
        rest_value:
          type: number
          format: float
        rest_unit:
          type: string
        rest_intensity:
          type: string

    Workout:
      type: object
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        date:
          type: string
          format: date
        distance_km:
          type: number
          format: float
        duration_seconds:
          type: integer
        avg_pace:
          type: string
        calories:
          type: integer
        avg_heart_rate:
          type: integer
        feeling:
          type: integer
          nullable: true
          minimum: 1
          maximum: 10
        type:
          type: string
          enum: [easy, tempo, intervals, long_run, race, fartlek, other]
        notes:
          type: string
        segments:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutSegment"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateWorkoutRequest:
      type: object
      required: [date, type]
      properties:
        date:
          type: string
          format: date
        distance_km:
          type: number
          format: float
        duration_seconds:
          type: integer
        avg_pace:
          type: string
        calories:
          type: integer
        avg_heart_rate:
          type: integer
        feeling:
          type: integer
          minimum: 1
          maximum: 10
        type:
          type: string
          enum: [easy, tempo, intervals, long_run, race, fartlek, other]
        notes:
          type: string
        segments:
          type: array
          items:
            $ref: "#/components/schemas/SegmentRequest"

    AssignedWorkout:
      type: object
      properties:
        id:
          type: integer
          format: int64
        coach_id:
          type: integer
          format: int64
        student_id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        type:
          type: string
        distance_km:
          type: number
          format: float
        duration_seconds:
          type: integer
        notes:
          type: string
        expected_fields:
          type: array
          items:
            type: string
        result_time_seconds:
          type: integer
          nullable: true
        result_distance_km:
          type: number
          format: float
          nullable: true
        result_heart_rate:
          type: integer
          nullable: true
        result_feeling:
          type: integer
          nullable: true
          minimum: 1
          maximum: 10
        image_file_id:
          type: integer
          format: int64
          nullable: true
        image_url:
          type: string
        status:
          type: string
          enum: [pending, completed, skipped]
        due_date:
          type: string
          format: date
        student_name:
          type: string
        coach_name:
          type: string
        segments:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutSegment"
        unread_message_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateAssignedWorkoutRequest:
      type: object
      required: [student_id, title, due_date]
      properties:
        student_id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        type:
          type: string
        distance_km:
          type: number
          format: float
        duration_seconds:
          type: integer
        notes:
          type: string
        expected_fields:
          type: array
          items:
            type: string
        due_date:
          type: string
          format: date
        segments:
          type: array
          items:
            $ref: "#/components/schemas/SegmentRequest"

    UpdateAssignedWorkoutStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [completed, skipped]
        result_time_seconds:
          type: integer
          nullable: true
        result_distance_km:
          type: number
          format: float
          nullable: true
        result_heart_rate:
          type: integer
          nullable: true
        result_feeling:
          type: integer
          nullable: true
          minimum: 1
          maximum: 10
        image_file_id:
          type: integer
          format: int64
          nullable: true

    CoachStudentInfo:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
        avatar_url:
          type: string

    DailySummaryItem:
      type: object
      properties:
        student_id:
          type: integer
          format: int64
        student_name:
          type: string
        student_avatar:
          type: string
          nullable: true
        assigned_workout:
          allOf:
            - $ref: "#/components/schemas/AssignedWorkout"
          nullable: true

    WorkoutTemplate:
      type: object
      properties:
        id:
          type: integer
          format: int64
        coach_id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        type:
          type: string
        notes:
          type: string
        expected_fields:
          type: array
          items:
            type: string
        segments:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutSegment"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateTemplateRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
        description:
          type: string
        type:
          type: string
        notes:
          type: string
        expected_fields:
          type: array
          items:
            type: string
        segments:
          type: array
          items:
            $ref: "#/components/schemas/SegmentRequest"

    WeeklyTemplate:
      type: object
      properties:
        id:
          type: integer
          format: int64
        coach_id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        day_count:
          type: integer
          description: Number of days with workouts defined
        days:
          type: array
          items:
            $ref: "#/components/schemas/WeeklyTemplateDay"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WeeklyTemplateDay:
      type: object
      properties:
        id:
          type: integer
          format: int64
        weekly_template_id:
          type: integer
          format: int64
        day_of_week:
          type: integer
          minimum: 0
          maximum: 6
          description: 0=Monday, 1=Tuesday, ..., 6=Sunday
        title:
          type: string
        description:
          type: string
        type:
          type: string
        distance_km:
          type: number
          format: float
        duration_seconds:
          type: integer
        notes:
          type: string
        from_template_id:
          type: integer
          format: int64
          nullable: true
        segments:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutSegment"

    WeeklyTemplateDayRequest:
      type: object
      required: [day_of_week, title]
      properties:
        day_of_week:
          type: integer
          minimum: 0
          maximum: 6
          description: 0=Monday, 1=Tuesday, ..., 6=Sunday
        title:
          type: string
        description:
          type: string
        type:
          type: string
        distance_km:
          type: number
          format: float
        duration_seconds:
          type: integer
        notes:
          type: string
        from_template_id:
          type: integer
          format: int64
          nullable: true
        segments:
          type: array
          items:
            $ref: "#/components/schemas/SegmentRequest"

    AssignWeeklyTemplateRequest:
      type: object
      required: [student_id, start_date]
      properties:
        student_id:
          type: integer
          format: int64
        start_date:
          type: string
          format: date
          description: Must be a Monday (YYYY-MM-DD)
        force:
          type: boolean
          default: false
          description: If true, overwrites all existing workouts in that week

    AssignConflictResponse:
      type: object
      properties:
        error:
          type: string
          example: conflict
        conflicting_dates:
          type: array
          items:
            type: string
            format: date

    CoachListItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        avatar_url:
