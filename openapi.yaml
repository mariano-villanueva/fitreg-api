openapi: 3.0.3
info:
  title: FitReg API
  description: |
    REST API for FitReg, a fitness coaching platform where coaches assign and manage
    workouts for their students.

    **Authentication:** All endpoints except `/health` and `POST /api/auth/google`
    require a JWT Bearer token obtained via Google OAuth.
  version: "1.0.0"

servers:
  - url: http://localhost:8080
    description: Local development

security:
  - bearerAuth: []

tags:
  - name: auth
    description: Authentication
  - name: me
    description: Current user profile
  - name: workouts
    description: Personal workouts
  - name: coach-students
    description: Coach — student management
  - name: coach-assigned-workouts
    description: Coach — assigned workout management
  - name: student-assigned-workouts
    description: Student — view and submit assigned workouts
  - name: coach-templates
    description: Coach — daily workout templates
  - name: coach-weekly-templates
    description: Coach — weekly workout templates
  - name: coach-profile
    description: Coach profile settings
  - name: coaches
    description: Public coach directory
  - name: achievements
    description: Coach achievements
  - name: invitations
    description: Coach-student invitations
  - name: notifications
    description: Notifications
  - name: files
    description: File upload/download
  - name: assignment-messages
    description: Messages on assigned workouts
  - name: admin
    description: Admin operations

paths:
  /health:
    get:
      tags: [auth]
      summary: Health check
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /api/auth/google:
    post:
      tags: [auth]
      summary: Exchange Google credential for JWT
      description: |
        Rate limited to 10 requests per IP per minute.
        Verifies the Google ID token, upserts the user, and returns a JWT.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [credential]
              properties:
                credential:
                  type: string
                  description: Google ID token from Google OAuth
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT to use in Authorization header
                  user:
                    $ref: "#/components/schemas/UserProfile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/me:
    get:
      tags: [me]
      summary: Get own profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      tags: [me]
      summary: Update profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/me/avatar:
    post:
      tags: [me]
      summary: Upload custom avatar
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                avatar:
                  type: string
                  format: binary
      responses:
        "200":
          description: Avatar uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      tags: [me]
      summary: Delete custom avatar
      responses:
        "200":
          description: Avatar deleted
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/coach-request:
    get:
      tags: [coach-students]
      summary: Get current coach request status
      responses:
        "200":
          description: Request status
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [coach-students]
      summary: Request a coach (student initiates)
      responses:
        "200":
          description: Request created
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/workouts:
    get:
      tags: [workouts]
      summary: List own workouts
      responses:
        "200":
          description: List of workouts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Workout"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [workouts]
      summary: Create workout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkoutRequest"
      responses:
        "201":
          description: Created workout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workout"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/workouts/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [workouts]
      summary: Get workout
      responses:
        "200":
          description: Workout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workout"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [workouts]
      summary: Update workout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkoutRequest"
      responses:
        "200":
          description: Updated workout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workout"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [workouts]
      summary: Delete workout
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/coach/students:
    get:
      tags: [coach-students]
      summary: List active students
      responses:
        "200":
          description: Students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CoachStudentInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/coach/students/{studentId}/workouts:
    parameters:
      - name: studentId
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags: [coach-students]
      summary: Get student's assigned workouts
      responses:
        "200":
          description: Assigned workouts for student
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AssignedWorkout"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/coach/daily-summary:
    get:
      tags: [coach-students]
      summary: Today's workout summary for all students
      responses:
        "200":
          description: Daily summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailySummaryItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/coach-students/{id}/end:
    parameters:
      - $ref: "#/components/parameters/PathId"
    put:
      tags: [coach-students]
      summary: End a coach-student relationship
      responses:
        "200":
          description: Relationship ended
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/coach/assigned-workouts:
    get:
      tags: [coach-assigned-workouts]
      summary: List all assigned workouts (coach view)
      responses:
        "200":
          description: Assigned workouts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AssignedWorkout"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [coach-assigned-workouts]
      summary: Create assigned workout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssignedWorkoutRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignedWorkout"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/coach/assigned-workouts/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [coach-assigned-workouts]
      summary: Get assigned workout
      responses:
        "200":
          description: Assigned workout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignedWorkout"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [coach-assigned-workouts]
      summary: Update assigned workout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssignedWorkoutRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignedWorkout"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [coach-assigned-workouts]
      summary: Delete assigned workout
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/my-assigned-workouts:
    get:
      tags: [student-assigned-workouts]
      summary: Get own assigned workouts
      responses:
        "200":
          description: Assigned workouts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AssignedWorkout"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/my-assigned-workouts/{id}/status:
    parameters:
      - $ref: "#/components/parameters/PathId"
    put:
      tags: [student-assigned-workouts]
      summary: Submit workout result
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAssignedWorkoutStatusRequest"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignedWorkout"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/coach/templates:
    get:
      tags: [coach-templates]
      summary: List workout templates
      responses:
        "200":
          description: Templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkoutTemplate"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [coach-templates]
      summary: Create workout template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTemplateRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutTemplate"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/coach/templates/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [coach-templates]
      summary: Get workout template
      responses:
        "200":
          description: Template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutTemplate"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [coach-templates]
      summary: Update workout template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTemplateRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutTemplate"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [coach-templates]
      summary: Delete workout template
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/coach/weekly-templates:
    get:
      tags: [coach-weekly-templates]
      summary: List weekly templates
      responses:
        "200":
          description: Weekly templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeeklyTemplate"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [coach-weekly-templates]
      summary: Create weekly template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyTemplate"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/coach/weekly-templates/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [coach-weekly-templates]
      summary: Get weekly template with all days and segments
      responses:
        "200":
          description: Weekly template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyTemplate"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [coach-weekly-templates]
      summary: Update name/description
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyTemplate"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [coach-weekly-templates]
      summary: Delete weekly template
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/coach/weekly-templates/{id}/days:
    parameters:
      - $ref: "#/components/parameters/PathId"
    put:
      tags: [coach-weekly-templates]
      summary: Replace all days (full replacement)
      description: |
        Replaces all days in the weekly template. Days not included are deleted.
        Each day has `day_of_week` (0=Monday, 6=Sunday). Only one entry per day allowed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [days]
              properties:
                days:
                  type: array
                  items:
                    $ref: "#/components/schemas/WeeklyTemplateDayRequest"
      responses:
        "200":
          description: Updated template with all days
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyTemplate"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/coach/weekly-templates/{id}/assign:
    parameters:
      - $ref: "#/components/parameters/PathId"
    post:
      tags: [coach-weekly-templates]
      summary: Assign weekly template to a student
      description: |
        Assigns all days of the weekly template to the student starting on `start_date` (must be a Monday).

        - `force: false` (default): Returns 409 if any day in the Mon–Sun range already has an assigned workout.
        - `force: true`: Deletes all existing assigned workouts for that student in the full Mon–Sun week, then creates new ones from the template.

        Rest days (no day defined in template) are skipped — no workout is created for those days.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignWeeklyTemplateRequest"
      responses:
        "200":
          description: Successfully assigned
          content:
            application/json:
              schema:
                type: object
                properties:
                  assigned_workout_ids:
                    type: array
                    items:
                      type: integer
                      format: int64
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Conflict — some days in that week already have workouts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignConflictResponse"

  /api/coach/profile:
    put:
      tags: [coach-profile]
      summary: Update coach profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                coach_description:
                  type: string
                coach_public:
                  type: boolean
      responses:
        "200":
          description: Updated
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/coaches:
    get:
      tags: [coaches]
      summary: List public coaches
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Search by name or description
      responses:
        "200":
          description: Coaches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CoachListItem"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/coaches/{coachId}:
    parameters:
      - name: coachId
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags: [coaches]
      summary: Get coach public profile
      responses:
        "200":
          description: Coach profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoachPublicProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/coaches/{coachId}/ratings:
    parameters:
      - name: coachId
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags: [coaches]
      summary: Get ratings for a coach
      responses:
        "200":
          description: Ratings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CoachRating"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [coaches]
      summary: Create or update rating (student only, upsert)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertRatingRequest"
      responses:
        "200":
          description: Rating saved
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/coach/achievements:
    get:
      tags: [achievements]
      summary: List own achievements
      responses:
        "200":
          description: Achievements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CoachAchievement"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [achievements]
      summary: Create achievement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAchievementRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoachAchievement"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/coach/achievements/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    put:
      tags: [achievements]
      summary: Update achievement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAchievementRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoachAchievement"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [achievements]
      summary: Delete achievement
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

